name: Update README

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: "0 0 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        env:
          # PERSONAL_ACCESS_TOKEN (optional): A PAT with `read:user` and
          # `public_repo` scopes. Required to read the user's pinned repositories
          # via the GraphQL API when the built-in GITHUB_TOKEN lacks that scope.
          # If not set, falls back to GITHUB_TOKEN (works for most public data).
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update README [skip ci]"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          file_pattern: README.md
